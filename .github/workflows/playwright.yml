name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      APP_URL: ${{ secrets.APP_URL }}
      APP_EMAIL: ${{ secrets.APP_EMAIL }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Verify environment variables
        run: |
          echo "APP_URL loaded: $([[ -n "$APP_URL" ]] && echo true || echo false)"
          echo "APP_EMAIL loaded: $([[ -n "$APP_EMAIL" ]] && echo true || echo false)"
          echo "APP_PASSWORD loaded: $([[ -n "$APP_PASSWORD" ]] && echo true || echo false)"

      - name: Run Playwright sanity tests
        run: npm run test:sanity

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
